<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>JavaConsole // write. compile. run.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0a0e0f;
    --surface: #10171a;
    --surface-2: #141d20;
    --border: #1f2c2f;
    --text: #d8e2e2;
    --muted: #6b8083;
    --gold: #d4af37;
    --gold-dim: #8a7327;
    --cyan: #4dd0e1;
    --red: #e0655a;
    --green: #6fcf97;
  }
  * { box-sizing: border-box; }
  html, body {
    margin:0; padding:0; height:100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
  }
  .app { display:flex; flex-direction:column; height:100vh; }

  /* ---------- Header ---------- */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, var(--surface-2), var(--surface));
    flex-shrink:0;
  }
  .brand { display:flex; align-items:baseline; gap:8px; }
  .brand .glyph { color: var(--gold); font-weight:700; }
  .brand h1 {
    font-family:'Space Grotesk', sans-serif;
    font-size: 15px; font-weight:600; letter-spacing: 0.02em;
    margin:0; color: var(--text);
  }
  .brand .cursor {
    display:inline-block; width:7px; height:14px; background:var(--gold);
    animation: blink 1.1s steps(1) infinite; margin-left:2px;
  }
  @keyframes blink { 50% { opacity:0; } }
  .status-pill {
    display:flex; align-items:center; gap:6px;
    font-size:11px; color:var(--muted);
    border:1px solid var(--border); padding:4px 10px; border-radius:20px;
  }
  .status-dot { width:7px; height:7px; border-radius:50%; background: var(--muted); }
  .status-dot.idle { background: var(--muted); }
  .status-dot.busy { background: var(--cyan); animation: pulse 0.9s ease-in-out infinite; }
  .status-dot.ok { background: var(--green); }
  .status-dot.err { background: var(--red); }
  @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1);} 50%{ opacity:.4; transform:scale(1.3);} }

  /* ---------- Tab bar ---------- */
  .tabbar {
    display:flex; align-items:center; gap:2px;
    background: var(--surface); border-bottom:1px solid var(--border);
    padding: 6px 10px 0 10px; flex-shrink:0; overflow-x:auto;
  }
  .tab {
    display:flex; align-items:center; gap:8px;
    padding: 7px 12px; font-size:12.5px; color:var(--muted);
    background: transparent; border:1px solid transparent; border-bottom:none;
    border-radius:6px 6px 0 0; cursor:pointer; white-space:nowrap;
  }
  .tab.active {
    color: var(--gold); background: var(--bg);
    border-color: var(--border);
  }
  .tab .close { opacity:.5; font-size:11px; }
  .tab .close:hover { opacity:1; color: var(--red); }
  .tab-add {
    color: var(--muted); background:none; border:none; cursor:pointer;
    font-size:16px; padding:6px 10px; line-height:1;
  }
  .tab-add:hover { color: var(--cyan); }

  /* ---------- Toolbar ---------- */
  .toolbar {
    display:flex; align-items:center; gap:8px;
    padding: 8px 12px; background: var(--bg); border-bottom:1px solid var(--border);
    flex-shrink:0; flex-wrap:wrap;
  }
  button.action {
    font-family:'JetBrains Mono', monospace;
    font-size:12px; font-weight:600; letter-spacing:.02em;
    padding: 7px 14px; border-radius:5px; cursor:pointer;
    border:1px solid var(--border); background: var(--surface); color: var(--text);
    transition: all .15s ease;
  }
  button.action:hover { border-color: var(--cyan); color:var(--cyan); }
  button.action.primary {
    background: var(--gold); color:#171200; border-color: var(--gold);
  }
  button.action.primary:hover { background:#e6c34d; color:#171200; }
  button.action.primary:disabled { opacity:.5; cursor:not-allowed; }
  input[type=file] { display:none; }
  .spacer { flex:1; }
  .hint { color:var(--muted); font-size:11px; }

  /* ---------- Workspace ---------- */
  .workspace { flex:1; display:flex; overflow:hidden; }
  .editor-pane, .console-pane { display:flex; flex-direction:column; overflow:hidden; }
  .editor-pane { flex: 1.3; border-right:1px solid var(--border); }
  .console-pane { flex:1; background: var(--surface); }

  .editor-shell { flex:1; display:flex; overflow:hidden; position:relative; }
  .gutter {
    background: var(--surface); color: var(--muted); text-align:right;
    padding: 14px 10px 14px 0; font-size:13px; line-height:20px;
    user-select:none; overflow:hidden; flex-shrink:0; min-width:42px;
    border-right:1px solid var(--border);
  }
  .editor-wrap { position:relative; flex:1; overflow:hidden; }
  .highlight-layer, .code-input {
    position:absolute; top:0; left:0; right:0; bottom:0;
    margin:0; padding:14px; font-size:13px; line-height:20px;
    font-family:'JetBrains Mono', monospace; white-space:pre; overflow:auto;
    tab-size:4;
  }
  .highlight-layer { pointer-events:none; color:var(--text); background:transparent; }
  .code-input {
    background: transparent; color: transparent; caret-color: var(--gold);
    border:none; resize:none; outline:none; z-index:2;
  }
  .code-input::selection { background: rgba(212,175,55,0.25); }

  /* syntax colors */
  .tok-kw { color: var(--cyan); font-weight:600; }
  .tok-type { color: #9ecbff; }
  .tok-str { color: var(--green); }
  .tok-com { color: var(--muted); font-style:italic; }
  .tok-num { color: var(--gold); }
  .tok-ann { color:#c98bd6; }

  /* ---------- Console pane ---------- */
  .console-header {
    display:flex; align-items:center; justify-content:space-between;
    padding: 9px 14px; border-bottom:1px solid var(--border);
    font-size:11px; color:var(--muted); letter-spacing:.05em; text-transform:uppercase;
  }
  .console-header button {
    background:none; border:none; color:var(--muted); cursor:pointer; font-size:11px;
  }
  .console-header button:hover { color: var(--red); }
  #output {
    flex:1; margin:0; padding:14px; overflow:auto; font-size:12.5px; line-height:1.6;
    white-space:pre-wrap; word-break:break-word;
  }
  #output .line-stdout { color: var(--text); }
  #output .line-stderr { color: var(--red); }
  #output .line-sys { color: var(--muted); }
  #output .line-ok { color: var(--green); }
  .stdin-row {
    display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--border);
  }
  .stdin-row input {
    flex:1; background: var(--bg); border:1px solid var(--border); color:var(--text);
    font-family:'JetBrains Mono', monospace; font-size:12px; padding:8px 10px; border-radius:5px;
    outline:none;
  }
  .stdin-row input:focus { border-color: var(--cyan); }

  /* ---------- Mobile ---------- */
  @media (max-width: 820px) {
    .workspace { flex-direction:column; }
    .editor-pane { border-right:none; border-bottom:1px solid var(--border); flex:1.2; }
    .console-pane { flex:1; }
    .brand h1 { font-size:13px; }
    .toolbar { gap:6px; }
    button.action { padding:6px 10px; font-size:11px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <span class="glyph">&gt;</span>
      <h1>JavaConsole<span class="cursor"></span></h1>
    </div>
    <div class="status-pill">
      <span class="status-dot idle" id="statusDot"></span>
      <span id="statusText">idle · fetching runtime…</span>
    </div>
  </header>

  <div class="tabbar" id="tabbar"></div>

  <div class="toolbar">
    <button class="action primary" id="runBtn">▶ Run</button>
    <button class="action" id="saveBtn">⭳ Save .java</button>
    <button class="action" id="loadBtn">⭱ Open file</button>
    <input type="file" id="fileInput" accept=".java,.txt">
    <div class="spacer"></div>
    <span class="hint" id="versionHint">java · —</span>
  </div>

  <div class="workspace">
    <div class="editor-pane">
      <div class="editor-shell">
        <div class="gutter" id="gutter">1</div>
        <div class="editor-wrap">
          <pre class="highlight-layer" id="highlight"><code></code></pre>
          <textarea class="code-input" id="code" spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>
        </div>
      </div>
    </div>

    <div class="console-pane">
      <div class="console-header">
        <span>Console</span>
        <button id="clearBtn">clear</button>
      </div>
      <pre id="output"><span class="line-sys">$ ready — write code, then press Run.</span></pre>
      <div class="stdin-row">
        <input type="text" id="stdin" placeholder="stdin for Scanner (newline-separated, optional)">
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  // ---------------- Files / tabs state ----------------
  const DEFAULT_MAIN = `import java.util.Scanner;

public class Main {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        System.out.println("JavaConsole is running.");
        System.out.print("Enter your name: ");
        if (sc.hasNextLine()) {
            String name = sc.nextLine();
            System.out.println("Hello, " + name + "! Compiled and executed live.");
        }
    }
}
`;

  let files = [ { name: 'Main.java', content: DEFAULT_MAIN } ];
  let activeIndex = 0;
  let javaVersion = null;

  const el = (id) => document.getElementById(id);
  const gutter = el('gutter');
  const highlight = el('highlight').querySelector('code');
  const codeInput = el('code');
  const tabbar = el('tabbar');
  const output = el('output');
  const stdinInput = el('stdin');
  const statusDot = el('statusDot');
  const statusText = el('statusText');
  const versionHint = el('versionHint');

  // ---------------- Syntax highlighting ----------------
  const KEYWORDS = new Set(['abstract','assert','break','case','catch','class','const','continue',
    'default','do','else','enum','extends','final','finally','for','goto','if','implements',
    'import','instanceof','interface','native','new','package','private','protected','public',
    'return','static','strictfp','super','switch','synchronized','this','throw','throws',
    'transient','try','void','volatile','while','var','record','yield','sealed','permits']);
  const TYPES = new Set(['boolean','byte','char','double','float','int','long','short',
    'String','Integer','Double','Float','Long','Short','Boolean','Character','Object',
    'List','ArrayList','Map','HashMap','Set','HashSet','Scanner','System','Math']);

  function escapeHtml(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  const TOKEN_RE = /(\/\/[^\n]*)|(\/\*[\s\S]*?\*\/)|("(?:\\.|[^"\\])*")|('(?:\\.|[^'\\])*')|(@\w+)|(\b\d+\.?\d*[fFdDlL]?\b)|(\b[A-Za-z_]\w*\b)/g;

  function highlightJava(src){
    let result = '';
    let lastIndex = 0;
    let m;
    TOKEN_RE.lastIndex = 0;
    while ((m = TOKEN_RE.exec(src)) !== null) {
      result += escapeHtml(src.slice(lastIndex, m.index));
      const [full, comment1, comment2, str, chr, ann, num, word] = m;
      if (comment1 || comment2) {
        result += `<span class="tok-com">${escapeHtml(full)}</span>`;
      } else if (str) {
        result += `<span class="tok-str">${escapeHtml(full)}</span>`;
      } else if (chr) {
        result += `<span class="tok-str">${escapeHtml(full)}</span>`;
      } else if (ann) {
        result += `<span class="tok-ann">${escapeHtml(full)}</span>`;
      } else if (num) {
        result += `<span class="tok-num">${escapeHtml(full)}</span>`;
      } else if (word) {
        if (KEYWORDS.has(word)) result += `<span class="tok-kw">${escapeHtml(word)}</span>`;
        else if (TYPES.has(word) || /^[A-Z]/.test(word)) result += `<span class="tok-type">${escapeHtml(word)}</span>`;
        else result += escapeHtml(word);
      }
      lastIndex = m.index + full.length;
    }
    result += escapeHtml(src.slice(lastIndex));
    return result;
  }

  function renderGutter(text){
    const lines = text.split('\n').length;
    let out = '';
    for (let i = 1; i <= lines; i++) out += i + '\n';
    gutter.textContent = out.trimEnd() + (lines >= 1 ? '' : '');
    // simpler: join with actual newlines
    gutter.textContent = Array.from({length: lines}, (_,i)=>i+1).join('\n');
  }

  function refreshHighlight(){
    const text = codeInput.value;
    highlight.innerHTML = highlightJava(text) + '\n';
    renderGutter(text);
  }

  codeInput.addEventListener('input', () => {
    files[activeIndex].content = codeInput.value;
    refreshHighlight();
  });
  codeInput.addEventListener('scroll', () => {
    el('highlight').scrollTop = codeInput.scrollTop;
    el('highlight').scrollLeft = codeInput.scrollLeft;
    gutter.scrollTop = codeInput.scrollTop;
  });
  codeInput.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const start = codeInput.selectionStart, end = codeInput.selectionEnd;
      codeInput.value = codeInput.value.slice(0,start) + '    ' + codeInput.value.slice(end);
      codeInput.selectionStart = codeInput.selectionEnd = start + 4;
      files[activeIndex].content = codeInput.value;
      refreshHighlight();
    }
  });

  // ---------------- Tabs ----------------
  function renderTabs(){
    tabbar.innerHTML = '';
    files.forEach((f, i) => {
      const tab = document.createElement('div');
      tab.className = 'tab' + (i === activeIndex ? ' active' : '');
      tab.innerHTML = `<span>${escapeHtml(f.name)}</span>` + (files.length > 1 ? `<span class="close">✕</span>` : '');
      tab.addEventListener('click', (e) => {
        if (e.target.classList.contains('close')) {
          e.stopPropagation();
          files.splice(i, 1);
          if (activeIndex >= files.length) activeIndex = files.length - 1;
          renderTabs(); loadActiveFile();
          return;
        }
        activeIndex = i;
        renderTabs(); loadActiveFile();
      });
      tabbar.appendChild(tab);
    });
    const addBtn = document.createElement('button');
    addBtn.className = 'tab-add';
    addBtn.textContent = '+';
    addBtn.title = 'New file';
    addBtn.addEventListener('click', () => {
      const name = prompt('New file name (e.g. Helper.java):', 'Helper.java');
      if (!name) return;
      const className = name.replace(/\.java$/,'');
      files.push({ name, content: `public class ${className} {\n    \n}\n` });
      activeIndex = files.length - 1;
      renderTabs(); loadActiveFile();
    });
    tabbar.appendChild(addBtn);
  }

  function loadActiveFile(){
    codeInput.value = files[activeIndex].content;
    refreshHighlight();
  }

  // ---------------- Runtime version fetch ----------------
  async function fetchRuntime(){
    try {
      const res = await fetch("http://localhost:3000/api/runtimes");
      const list = await res.json();
      const javaEntry = list.find(r => r.language === 'java');
      if (javaEntry) {
        javaVersion = javaEntry.version;
        versionHint.textContent = `java · ${javaVersion}`;
        setStatus('idle', 'idle · ready');
      } else {
        setStatus('err', 'java runtime unavailable');
      }
    } catch (err) {
      setStatus('err', 'offline · runtime check failed');
      versionHint.textContent = 'java · unknown';
    }
  }

  function setStatus(kind, text){
    statusDot.className = 'status-dot ' + kind;
    statusText.textContent = text;
  }

  // ---------------- Run ----------------
  function appendOutput(text, cls){
    const span = document.createElement('span');
    span.className = cls;
    span.textContent = text;
    output.appendChild(span);
  }

  async function runCode(){
    files[activeIndex].content = codeInput.value;
    output.innerHTML = '';
    appendOutput('$ compiling & running…\n', 'line-sys');
    setStatus('busy', 'compiling…');
    el('runBtn').disabled = true;

    const stdin = stdinInput.value.replace(/\\n/g, '\n');

    try {
      const res = await fetch fetch("http://localhost:3000/api/execute", ...), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          language: 'java',
          version: javaVersion || '*',
          files: files.map(f => ({ name: f.name, content: f.content })),
          stdin: stdin
        })
      });
      const data = await res.json();

      if (data.compile && data.compile.stderr) {
        appendOutput(data.compile.stderr, 'line-stderr');
        setStatus('err', 'compile error');
      } else if (data.run) {
        if (data.run.stdout) appendOutput(data.run.stdout, 'line-stdout');
        if (data.run.stderr) appendOutput('\n' + data.run.stderr, 'line-stderr');
        const code = data.run.code;
        if (code === 0) {
          appendOutput(`\n$ exited with code 0`, 'line-ok');
          setStatus('ok', 'ran successfully');
        } else {
          appendOutput(`\n$ exited with code ${code}`, 'line-stderr');
          setStatus('err', `exit code ${code}`);
        }
      } else {
        appendOutput('\nNo output returned from execution service.', 'line-sys');
        setStatus('err', 'no output');
      }
    } catch (err) {
      appendOutput('\nNetwork error — could not reach the execution service. Check your connection and try again.', 'line-stderr');
      setStatus('err', 'network error');
    } finally {
      el('runBtn').disabled = false;
      output.scrollTop = output.scrollHeight;
    }
  }

  el('runBtn').addEventListener('click', runCode);
  el('clearBtn').addEventListener('click', () => {
    output.innerHTML = '';
    appendOutput('$ console cleared.\n', 'line-sys');
  });

  // ---------------- Save / Load ----------------
  el('saveBtn').addEventListener('click', () => {
    files[activeIndex].content = codeInput.value;
    const f = files[activeIndex];
    const blob = new Blob([f.content], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = f.name;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  el('loadBtn').addEventListener('click', () => el('fileInput').click());
  el('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      files.push({ name: file.name, content: reader.result });
      activeIndex = files.length - 1;
      renderTabs(); loadActiveFile();
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // ---------------- Keyboard shortcut: Ctrl/Cmd+Enter to run ----------------
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      runCode();
    }
  });

  // ---------------- Init ----------------
  renderTabs();
  loadActiveFile();
  fetchRuntime();
})();
</script>
</body>
</html>
